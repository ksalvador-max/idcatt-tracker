// ── STATE ─────────────────────────────────────────────────────
let S = {};

function initState() {
  const raw = localStorage.getItem('idcatt-v5');
  if (raw) { try { S = JSON.parse(raw); return; } catch(e){} }
  MODULES.forEach(m => {
    if (m.isGlobal) return;
    (m.entregables||[]).forEach(e => {
      S[e.id] = {active:true, status:'pendiente', resp:'', fecha:'', obs:'', docs:[]};
    });
    // Cierre slots per module
    if (!S['cierre_'+m.id]) S['cierre_'+m.id] = {};
    CIERRE_SLOTS.forEach(sl => {
      if (!S['cierre_'+m.id][sl.key]) S['cierre_'+m.id][sl.key] = {status:'pendiente', docs:[]};
    });
  });
}

function persist() {
  localStorage.setItem('idcatt-v5', JSON.stringify(S));
  const t = document.getElementById('toast');
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 1400);
  updateHeader();
  updateSb();
}

// ── SHEETS SYNC ──────────────────────────────────────────────
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz67eCuYgiEKdguv_O_wsg_Vj0qn7nFedxw1yAYkvQeu0FQH1w-EwDzZYIWyOdlVH8l/exec';
let SYNC_USER = null;
let SYNC_ONLINE = false;
let SYNC_PENDING = []; // queue of changes when offline

function syncInit() {
  updateSyncBadge('⏳ Conectando..', '#f0c060');
  fetch(WEB_APP_URL, {method:'GET', mode:'no-cors'})
    .then(() => {
      // no-cors means we can't read response — use iframe trick for auth check
      loadFromSheet();
    })
    .catch(() => {
      updateSyncBadge('⚠️ Sin conexión — modo local', '#e89090');
      SYNC_ONLINE = false;
      initState(); updateSb(); updateHeader(); showGlobal();
    });
}

function loadFromSheet() {
  // Use a hidden iframe to trigger Google auth if needed, then fetch data
  updateSyncBadge('⏳ Cargando datos..', '#f0c060');
  
  fetch(WEB_APP_URL, {
    method: 'POST',
    mode: 'cors',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify({accion: 'leerDatos'})
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok) {
      SYNC_USER = data.user || 'Usuario';
      SYNC_ONLINE = true;
      // Merge Sheet data into local state
      mergeSheetData(data.datos);
      updateSyncBadge('🟢 ' + SYNC_USER.split('@')[0], '#7ec99a');
      updateSb(); updateHeader(); showGlobal();
    } else if (data.error && data.error.includes('autorizado')) {
      updateSyncBadge('🔒 No autorizado', '#e89090');
      showAuthError(data.error);
    } else {
      // Likely needs Google login — open auth popup
      openAuthPopup();
    }
  })
  .catch(() => {
    // CORS blocked = needs auth, open popup
    openAuthPopup();
  });
}

function openAuthPopup() {
  updateSyncBadge('🔑 Iniciando sesión..', '#f0c060');
  const popup = window.open(WEB_APP_URL, 'auth', 'width=500,height=600');
  
  // Poll until popup closes (user has logged in)
  const poll = setInterval(() => {
    if (!popup || popup.closed) {
      clearInterval(poll);
      setTimeout(() => loadFromSheet(), 1000);
    }
  }, 500);
}

function mergeSheetData(sheetData) {
  // sheetData: { M0: {entregables:[...], cierre:{...}}, M1: ... }
  if (!sheetData) return;
  
  Object.entries(sheetData).forEach(([modId, modData]) => {
    // Entregables técnicos
    (modData.entregables || []).forEach(e => {
      if (!e.code) return;
      // Find matching entregable by code
      let entId = null;
      MODULES.forEach(m => {
        (m.entregables||[]).forEach(ent => {
          if (ent.code === e.code || ent.id === e.code) entId = ent.id;
        });
      });
      if (!entId) return;
      if (!S[entId]) S[entId] = {active:true,status:'pendiente',resp:'',fecha:'',obs:'',docs:[]};
      S[entId].active = e.active !== false;
      S[entId].status = e.status || 'pendiente';
      S[entId].resp   = e.resp || '';
      S[entId].fecha  = e.fecha || '';
      S[entId].obs    = e.obs || '';
      if (e.doc_nombre) {
        // Convert flat doc fields to docs array format
        const existing = (S[entId].docs||[]).find(d=>d.name===e.doc_nombre);
        if (!existing && e.doc_nombre) {
          S[entId].docs = [{id:'sheet_1', name:e.doc_nombre, url:e.doc_url||'', tipo:'', fecha:'', obs:''}];
        }
      }
    });
    
    // Cierre slots
    if (modData.cierre) {
      const ck = 'cierre_'+modId;
      if (!S[ck]) S[ck] = {};
      Object.entries(modData.cierre).forEach(([key, val]) => {
        if (!S[ck][key]) S[ck][key] = {status:'pendiente',docs:[]};
        S[ck][key].status = val.status || 'pendiente';
        // Preserve existing docs array, but update from sheet if sheet has data
        if (val.doc1_nombre && !S[ck][key].docs.find(d=>d.name===val.doc1_nombre)) {
          S[ck][key].docs.push({id:'sheet_d1',name:val.doc1_nombre,url:val.doc1_url||'',tipo:'',fecha:val.importe?'':'',obs:''});
        }
        if (val.doc2_nombre && !S[ck][key].docs.find(d=>d.name===val.doc2_nombre)) {
          S[ck][key].docs.push({id:'sheet_d2',name:val.doc2_nombre,url:val.doc2_url||'',tipo:'',fecha:'',obs:''});
        }
        if (val.importe) S[ck][key].importe = val.importe;
        if (val.obs)     S[ck][key].obs_cierre = val.obs;
      });
    }
  });
  
  localStorage.setItem('idcatt-v5', JSON.stringify(S));
}

function syncToSheet(accion, payload) {
  if (!SYNC_ONLINE) {
    SYNC_PENDING.push({accion, payload});
    return;
  }
  fetch(WEB_APP_URL, {
    method: 'POST',
    mode: 'cors',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify({accion, ...payload})
  })
  .then(r => r.json())
  .then(data => {
    if (!data.ok) console.warn('Sync error:', data.error);
  })
  .catch(err => {
    console.warn('Sync failed, queued:', err);
    SYNC_PENDING.push({accion, payload});
    updateSyncBadge('⚠️ Guardando local..', '#f0c060');
  });
}

function getE(id) {
  if (!S[id]) S[id] = {active:true, status:'pendiente', resp:'', fecha:'', obs:'', docs:[]};
  if (S[id].active === undefined) S[id].active = true;
  if (!S[id].docs) S[id].docs = [];
  return S[id];
}

function getCierre(modId, key) {
  const k = 'cierre_'+modId;
  if (!S[k]) S[k] = {};
  if (!S[k][key]) S[k][key] = {status:'pendiente', docs:[]};
  return S[k][key];
}

function totalDocs() {
  let n = 0;
  Object.values(S).forEach(v => {
    if (Array.isArray(v.docs)) n += v.docs.length;
    else if (v && typeof v === 'object') {
      Object.values(v).forEach(sl => { if (sl && Array.isArray(sl.docs)) n += sl.docs.length; });
    }
  });
  return n;
}

// ── STATUS ────────────────────────────────────────────────────
const SC = ['pendiente','en-curso','completado'];
const SL = {pendiente:'Pendiente','en-curso':'En curso',completado:'Completado'};

function cycleStatus(id, el) {
  const e = getE(id);
  const i = SC.indexOf(e.status||'pendiente');
  e.status = SC[(i+1)%3];
  persist();
  el.className = 'badge ' + e.status;
  el.textContent = SL[e.status];
}

function cycleCierreStatus(modId, key, el) {
  const c = getCierre(modId, key);
  const i = SC.indexOf(c.status||'pendiente');
  c.status = SC[(i+1)%3];
  persist();
  el.className = 'badge ' + c.status;
  el.textContent = SL[c.status];
}

function toggleActive(id, chk) {
  getE(id).active = chk.checked;
  persist();
  const row = document.getElementById('row_'+id);
  if (row) row.classList.toggle('disabled-row', !chk.checked);
}

function handleEdit(el) {
  const id = el.dataset.id, f = el.dataset.f;
  getE(id)[f] = el.innerText.trim();
  persist();
  el.classList.toggle('e', !el.innerText.trim());
}

// ── STATS ─────────────────────────────────────────────────────
function modStats(mod) {
  const active = (mod.entregables||[]).filter(e => getE(e.id).active !== false);
  let done=0,cur=0,pend=0,docs=0;
  active.forEach(e => {
    const st = getE(e.id).status||'pendiente';
    if(st==='completado')done++; else if(st==='en-curso')cur++; else pend++;
    docs += (getE(e.id).docs||[]).length;
  });
  // Add cierre docs
  const ck = 'cierre_'+mod.id;
  if (S[ck]) Object.values(S[ck]).forEach(sl => { docs += (sl.docs||[]).length; });
  const tot = active.length;
  return {tot,done,cur,pend,docs,pct:tot?Math.round(done/tot*100):0};
}

function gStats() {
  let tot=0,done=0,cur=0,pend=0,docs=0;
  MODULES.forEach(m => {
    if(m.isGlobal) return;
    const s = modStats(m);
    tot+=s.tot; done+=s.done; cur+=s.cur; pend+=s.pend; docs+=s.docs;
  });
  return {tot,done,cur,pend,docs,pct:tot?Math.round(done/tot*100):0};
}

function updateHeader() {
  const s = gStats();
  document.getElementById('gs-t').textContent   = s.tot;
  document.getElementById('gs-d').textContent   = s.done;
  document.getElementById('gs-c').textContent   = s.cur;
  document.getElementById('gs-p').textContent   = s.pend;
  document.getElementById('gs-doc').textContent = s.docs;
}

// ── NAV ───────────────────────────────────────────────────────
let CUR = 'global', CUR_TAB = 'tec';

function updateSb() {
  const sb = document.getElementById('sb');
  sb.innerHTML = '<div class="sb-sec">Módulos del proyecto</div>';
  MODULES.forEach(mod => {
    const s = mod.isGlobal ? gStats() : modStats(mod);
    const pc = s.pct===100?'var(--gn)':s.pct>50?'var(--am)':'var(--rd)';
    const btn = document.createElement('button');
    btn.className = 'nav'+(CUR===mod.id?' on':'');
    btn.onclick = () => go(mod.id);
    btn.innerHTML =
      `<span style="font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;background:${mod.colorBg||'#eaf1f8'};color:${mod.color||'#1a5276'};min-width:30px;text-align:center;flex-shrink:0">${mod.label}</span>`+
      `<div class="ni"><div style="font-size:11px;line-height:1.3">${mod.name}</div>`+
      (mod.isGlobal?'':
        `<div class="npb"><div class="npf" style="width:${s.pct}%;background:${pc}"></div></div>`)+
      `</div><span class="nb">${mod.isGlobal?s.tot:s.done+'/'+s.tot}</span>`;
    sb.appendChild(btn);
  });
}

function go(id) {
  CUR = id; CUR_TAB = 'tec';
  updateSb();
  const mod = MODULES.find(m=>m.id===id);
  if (!mod) return;
  mod.isGlobal ? showGlobal() : showModule(mod);
}

      <div class="sc a"><div class="sl">En curso</div><div class="sv">${s.cur}</div></div>
      <div class="sc r"><div class="sl">Pendiente</div><div class="sv">${s.pend}</div></div>
      <div class="sc b"><div class="sl">Documentos</div><div class="sv">${s.docs}</div></div>
    </div>`;
  MODULES.filter(m=>!m.isGlobal).forEach(mod => {
    const ms = modStats(mod);
    const pc = ms.pct===100?'var(--gn)':ms.pct>50?'var(--am)':'var(--rd)';
    h += `<div class="gc" onclick="go('${mod.id}')"><div class="gc-hdr">
      <span class="mtag" style="background:${mod.colorBg};color:${mod.color}">${mod.label}</span>
      <div class="mn" style="flex:1"><strong>${mod.name}</strong><small>${mod.empresa}</small></div>
      ${mod.importe?`<div style="font-size:11px;color:var(--tx2);text-align:right;white-space:nowrap"><small>Adj.</small><br><strong style="font-size:13px;color:var(--tx)">${mod.importe.toLocaleString('es-ES',{minimumFractionDigits:2})} €</strong></div>`:''}
      <div style="font-size:11px;color:var(--bl);white-space:nowrap">${ms.docs} docs</div>
      <div class="mpb"><div class="mbar"><div class="mbf" style="width:${ms.pct}%;background:${pc}"></div></div><span class="mpct" style="color:${pc}">${ms.pct}%</span></div>
      <span style="color:var(--tx3)">→</span>
    </div></div>`;
  });
  document.getElementById('main').innerHTML = h;
}

// ── MODULE ────────────────────────────────────────────────────
let fSt='all',fHi='all',fRk='all',fTx='',fAct='all';

function showModule(mod) {
  fSt='all'; fHi='all'; fRk='all'; fTx=''; fAct='all';
  CUR_TAB = 'tec';
  renderModuleShell(mod);
  renderTecTab(mod);
}

function renderModuleShell(mod) {
  const s = modStats(mod);
  const pc = s.pct===100?'var(--gn)':s.pct>50?'var(--am)':'var(--rd)';
  const nActive = (mod.entregables||[]).filter(e=>getE(e.id).active!==false).length;
  const nTotal  = (mod.entregables||[]).length;

  let h = `<div class="sh">
    <h2><span style="background:${mod.colorBg};color:${mod.color};padding:2px 8px;border-radius:4px;font-size:13px;margin-right:8px">${mod.label}</span>${mod.name}</h2>
    <div class="sm">
      <span>${mod.empresa}</span>
      ${mod.importe?`<span>Adj.: <strong>${mod.importe.toLocaleString('es-ES',{minimumFractionDigits:2})} €</strong></span>`:''}
      <span>Avance: <strong style="color:${pc}">${s.done}/${s.tot} (${s.pct}%)</strong></span>
      <span>Entregables activos: <strong>${nActive}/${nTotal}</strong></span>
      <span>Docs: <strong style="color:var(--bl)">${s.docs}</strong></span>
    </div></div>`;

  // Hito cards
  if (mod.hitos&&mod.hitos.length) {
    h += '<div class="hgrid">';
    mod.hitos.forEach(hi => {
      const its = (mod.entregables||[]).filter(e=>e.hito===hi.id&&getE(e.id).active!==false);
      const dn  = its.filter(e=>getE(e.id).status==='completado').length;
      const pp  = its.length?Math.round(dn/its.length*100):0;
      const cc  = pp===100?'var(--gn)':pp>0?'var(--am)':'var(--tx3)';
      h += `<div class="hc"><div class="hc-tag" style="color:${mod.color}">${hi.label}</div>
        <div class="hc-desc">${hi.desc}</div>
        <div class="hc-stat" style="color:${cc}">${dn}/${its.length} · ${pp}%</div></div>`;
    });
    h += '</div>';
  }

  // Tabs
  const cierreDocCount = (() => {
    let n=0;
    const ck='cierre_'+mod.id;
    if(S[ck]) Object.values(S[ck]).forEach(sl=>{ n+=(sl.docs||[]).length; });
    return n;
  })();

  h += `<div class="mod-tabs">
    <button class="mod-tab on" id="tab-tec" onclick="switchTab('${mod.id}','tec')">
      Entregables técnicos <span class="tab-cnt">${nActive}</span>
    </button>
    <button class="mod-tab" id="tab-cierre" onclick="switchTab('${mod.id}','cierre')">
      Cierre del contrato <span class="tab-cnt">${cierreDocCount > 0 ? cierreDocCount+' docs' : '4 hitos'}</span>
    </button>
  </div>
  <div id="tab-content"></div>`;

  document.getElementById('main').innerHTML = h;
}

function switchTab(modId, tab) {
  CUR_TAB = tab;
  document.getElementById('tab-tec').classList.toggle('on', tab==='tec');
  document.getElementById('tab-cierre').classList.toggle('on', tab==='cierre');
  const mod = MODULES.find(m=>m.id===modId);
  if (tab==='tec') renderTecTab(mod);
  else renderCierreTab(mod);
}

// ── ENTREGABLES TAB ───────────────────────────────────────────
function renderTecTab(mod) {
  const hiOpts = (mod.hitos||[]).map(h=>`<option value="${h.id}">${h.label}: ${h.desc}</option>`).join('');
  let h = `<div class="fb">
    <label>Estado:</label>
    <select onchange="fSt=this.value;drawTable('${mod.id}')">
      <option value="all">Todos</option><option value="pendiente">Pendiente</option>
      <option value="en-curso">En curso</option><option value="completado">Completado</option>
    </select>
    ${mod.hitos&&mod.hitos.length?`<label>Hito:</label><select onchange="fHi=this.value;drawTable('${mod.id}')"><option value="all">Todos</option>${hiOpts}</select>`:''}
    <label>Riesgo:</label>
    <select onchange="fRk=this.value;drawTable('${mod.id}')">
      <option value="all">Todos</option><option value="alto">Alto</option><option value="medio">Medio</option><option value="bajo">Bajo</option>
    </select>
    <label>Activos:</label>
    <select onchange="fAct=this.value;drawTable('${mod.id}')">
      <option value="all">Todos</option><option value="active">Solo activos</option><option value="inactive">Solo inactivos</option>
    </select>
    <input type="text" placeholder="Buscar..." oninput="fTx=this.value;drawTable('${mod.id}')" style="width:130px">
  </div>
  <div id="tbl"></div>`;
  document.getElementById('tab-content').innerHTML = h;
  drawTable(mod.id);
}

function drawTable(modId) {
  const mod = MODULES.find(m=>m.id===modId);
  const hiMap={}; (mod.hitos||[]).forEach(h=>hiMap[h.id]=h);
  const items = (mod.entregables||[]).filter(e => {
    const es = getE(e.id);
    const act = es.active !== false;
    if(fAct==='active'&&!act) return false;
    if(fAct==='inactive'&&act) return false;
    const st = es.status||'pendiente';
    if(fSt!=='all'&&st!==fSt) return false;
    if(fHi!=='all'&&e.hito!==fHi) return false;
    if(fRk!=='all'&&e.riesgo!==fRk) return false;
    if(fTx&&!e.desc.toLowerCase().includes(fTx.toLowerCase())&&!(e.code||'').toLowerCase().includes(fTx.toLowerCase())) return false;
    return true;
  });

  let h = `<div class="tw"><table style="min-width:860px">
    <colgroup>
      <col style="width:28px"><col style="width:68px"><col style="width:185px"><col style="width:78px">
      <col style="width:58px"><col style="width:90px"><col style="width:92px"><col style="width:78px">
      <col style="width:120px"><col>
    </colgroup>
    <thead><tr>
      <th title="Activar/desactivar entregable">✓</th>
      <th>Código</th><th>Entregable</th><th>Hito</th><th>Riesgo</th>
      <th>Estado</th><th>Responsable</th><th>Fecha</th>
      <th>📎 Documentos</th><th>Observaciones</th>
    </tr></thead><tbody>`;

  if (!items.length) {
    h += `<tr><td colspan="10" style="text-align:center;padding:20px;color:var(--tx3);font-style:italic">Sin resultados para los filtros aplicados</td></tr>`;
  }

  items.forEach(e => {
    const es = getE(e.id);
    const act = es.active !== false;
    const st  = es.status||'pendiente';
    const hi  = hiMap[e.hito];
    const prtrH = (e.prtr||[]).map(t=>`<span class="pt">${t}</span>`).join('');
    const docs  = es.docs||[];
    const cnt   = docs.length;

    let docCell = `<button class="dc-btn ${cnt?'has':''}" onclick="openEDocDrawer('${e.id}',event)">
      <span>${cnt?'📎':'+'}</span><span>${cnt?cnt+' doc'+(cnt>1?'s':''):'Añadir'}</span>
    </button>`;
    if (cnt) {
      docCell += docs.slice(0,1).map(d=>{
        const nm=d.name||'sin nombre';
        return `<div class="dc-pill" onclick="openEDocDrawer('${e.id}',event)" title="${nm}">📎 ${nm.substring(0,14)}${nm.length>14?'…':''}</div>`;
      }).join('');
      if(cnt>1) docCell+=`<div class="dc-pill" onclick="openEDocDrawer('${e.id}',event)" style="color:var(--tx3);background:var(--sf2);border-color:var(--bd2)">+${cnt-1}</div>`;
    }

    h += `<tr id="row_${e.id}" class="${act?'':'disabled-row'}">
      <td style="text-align:center">
        <input type="checkbox" class="chk" ${act?'checked':''} onchange="toggleActive('${e.id}',this)" title="Activar/desactivar este entregable">
      </td>
      <td style="font-family:monospace;font-size:10px;color:var(--tx3)">${e.code||e.id}</td>
      <td>
        <div class="td-ent" style="font-size:12px;font-weight:500">${e.desc}</div>
        <div style="margin-top:3px">${prtrH}</div>
        ${e.ev_tipo?`<div style="font-size:10px;color:var(--tx3);margin-top:2px;font-style:italic">${e.ev_tipo}</div>`:''}
        ${e.indicador?`<div style="font-size:10px;color:var(--bl);margin-top:1px">↗ ${e.indicador}</div>`:''}
      </td>
      <td>${hi?`<span class="hl">${hi.label}</span><div style="font-size:10px;color:var(--tx3);margin-top:2px;line-height:1.3">${hi.desc}</div>`:'—'}</td>
      <td>${e.riesgo?`<span class="rk ${e.riesgo}">${e.riesgo.charAt(0).toUpperCase()+e.riesgo.slice(1)}</span>`:'—'}</td>
      <td>
        <span class="badge ${st}" onclick="${act?`cycleStatus('${e.id}',this)`:''}" ${act?'':'style="cursor:default;opacity:.5"'}>${SL[st]}</span>
      </td>
      <td><div class="ed ${es.resp?'':'e'}" contenteditable="${act}" data-ph="Responsable..." data-id="${e.id}" data-f="resp" onblur="handleEdit(this)" onfocus="this.classList.remove('e')">${es.resp||''}</div></td>
      <td><div class="ed ${es.fecha?'':'e'}" contenteditable="${act}" data-ph="dd/mm/aaaa" data-id="${e.id}" data-f="fecha" onblur="handleEdit(this)" onfocus="this.classList.remove('e')">${es.fecha||''}</div></td>
      <td>${docCell}</td>
      <td><div class="ed ${es.obs?'':'e'}" contenteditable="${act}" data-ph="Notas..." data-id="${e.id}" data-f="obs" onblur="handleEdit(this)" onfocus="this.classList.remove('e')">${es.obs||''}</div></td>
    </tr>`;
  });

  h += `</tbody></table>
    <div style="padding:7px 11px;font-size:11px;color:var(--tx3);border-top:1px solid var(--bd)">
      ${items.length} de ${(mod.entregables||[]).length} entregables · Desmarca ✓ para desactivar un entregable · Clic en estado para avanzar
    </div></div>`;
  document.getElementById('tbl').innerHTML = h;
}

// ── ENTREGABLE DOC DRAWER (inline panel, no overlay) ──────────
let EDT_ID = null;

function openEDocDrawer(entId, event) {
  event.stopPropagation();
  EDT_ID = entId;
  let ent = null;
  MODULES.forEach(m=>(m.entregables||[]).forEach(e=>{ if(e.id===entId) ent=e; }));

  // Build inline panel below the row — insert after the row
  const row = document.getElementById('row_'+entId);
  // Remove existing panel if any
  const existing = document.getElementById('edoc_panel_'+entId);
  if (existing) { existing.remove(); EDT_ID=null; return; }
  // Remove any other open panels
  document.querySelectorAll('[id^="edoc_panel_"]').forEach(el=>el.remove());

  const tr = document.createElement('tr');
  tr.id = 'edoc_panel_'+entId;
  tr.innerHTML = `<td colspan="10" style="padding:0;background:var(--ac2);border-bottom:2px solid var(--ac)">
    <div id="edoc_inner_${entId}" style="padding:14px 16px"></div>
  </td>`;
  row.after(tr);
  renderEDocPanel(entId, ent);
}

function renderEDocPanel(entId, ent) {
  const es = getE(entId);
  const docs = es.docs||[];
  const tipos = ['Informe técnico','Acta firmada','Factura / Albarán','Certificado','Fotografías','Captura pantalla','Vídeo / Demo','Manual','Otro'];
  let h = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <strong style="font-size:13px">${ent?ent.desc:'Documentos'}</strong>
    <button onclick="document.getElementById('edoc_panel_${entId}').remove()" style="border:none;background:none;cursor:pointer;font-size:16px;color:var(--tx3)">✕</button>
  </div>`;
  if(ent&&ent.ev_tipo) h+=`<div style="font-size:11px;font-style:italic;color:var(--am);margin-bottom:10px;padding:5px 8px;background:var(--am2);border-radius:var(--r);border-left:3px solid var(--am3)">💡 ${ent.ev_tipo}</div>`;

  if(!docs.length) h+=`<p class="empty-msg">Sin documentos aportados todavía</p>`;
  else {
    h+='<div class="doc-list-inline">';
    docs.forEach(d=>{
      const [ic,cl]=iconCls(d.url,d.name);
      h+=`<div class="di"><div class="di-top"><div class="di-ico ${cl}">${ic}</div><div class="di-info">
        <div class="di-name">${d.name||'Sin nombre'}</div>
        ${d.url?`<div class="di-url"><a href="${d.url}" target="_blank">↗ Abrir</a></div>`:''}
        ${d.tipo?`<div class="di-meta2">Tipo: ${d.tipo}</div>`:''}
        ${d.fecha?`<div class="di-meta2">Fecha: ${d.fecha}</div>`:''}
        ${d.obs?`<div class="di-meta2" style="font-style:italic">${d.obs}</div>`:''}
      </div></div>
      <div class="di-acts">
        ${d.url?`<a class="di-open" href="${d.url}" target="_blank">Abrir ↗</a>`:''}
        <button class="di-del" onclick="delEDoc('${entId}','${d.id}')">Eliminar</button>
      </div></div>`;
    });
    h+='</div>';
  }

  h+=`<div class="add-doc-form"><h4>Añadir documento</h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fr"><label>Nombre *</label><input type="text" id="edf_n_${entId}" placeholder="Nombre del documento"></div>
      <div class="fr"><label>Enlace Drive / URL</label><input type="text" id="edf_u_${entId}" placeholder="https://drive.google.com/..."></div>
      <div class="fr"><label>Tipo</label><select id="edf_t_${entId}"><option value="">—</option>${tipos.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="fr"><label>Fecha</label><input type="text" id="edf_f_${entId}" placeholder="dd/mm/aaaa"></div>
    </div>
    <div class="fr"><label>Observaciones</label><textarea id="edf_o_${entId}" placeholder="Notas, versión, estado firma..." style="min-height:36px"></textarea></div>
    <button class="add-btn" onclick="addEDoc('${entId}')">+ Añadir documento</button>
  </div>`;

  document.getElementById('edoc_inner_'+entId).innerHTML = h;
}

function addEDoc(entId) {
  const name = document.getElementById('edf_n_'+entId).value.trim();
  if(!name){alert('El nombre es obligatorio');return;}
  const es = getE(entId);
  if(!es.docs) es.docs=[];
  es.docs.push({
    id:Date.now()+'', name,
    url:  document.getElementById('edf_u_'+entId).value.trim(),
    tipo: document.getElementById('edf_t_'+entId).value,
    fecha:document.getElementById('edf_f_'+entId).value.trim(),
    obs:  document.getElementById('edf_o_'+entId).value.trim()
  });
  persist();
  let ent=null; MODULES.forEach(m=>(m.entregables||[]).forEach(e=>{if(e.id===entId)ent=e;}));
  renderEDocPanel(entId,ent);
  ['edf_n_','edf_u_','edf_f_','edf_o_'].forEach(p=>{
    const el=document.getElementById(p+entId); if(el) el.value='';
  });
  // Update the doc cell button in the row
  const row = document.getElementById('row_'+entId);
  if(row){
    const docs=getE(entId).docs||[];
    const cnt=docs.length;
    const td = row.cells[8];
    if(td){
      td.innerHTML=`<button class="dc-btn has" onclick="openEDocDrawer('${entId}',event)"><span>📎</span><span>${cnt} doc${cnt>1?'s':''}</span></button>`+
        docs.slice(0,1).map(d=>{const nm=d.name||'sin nombre';return`<div class="dc-pill" onclick="openEDocDrawer('${entId}',event)">📎 ${nm.substring(0,14)}${nm.length>14?'…':''}</div>`;}).join('')+
        (cnt>1?`<div class="dc-pill" style="color:var(--tx3);background:var(--sf2);border-color:var(--bd2)" onclick="openEDocDrawer('${entId}',event)">+${cnt-1}</div>`:'');
    }
  }
}

function delEDoc(entId, docId) {
  const es=getE(entId);
  es.docs=(es.docs||[]).filter(d=>d.id!==docId);
  persist();
  let ent=null; MODULES.forEach(m=>(m.entregables||[]).forEach(e=>{if(e.id===entId)ent=e;}));
  renderEDocPanel(entId,ent);
}

// ── CIERRE TAB ───────────────────────────────────────────────

  let h = '<div class="cierre-grid">';
  CIERRE_SLOTS.forEach(sl => {
    const c = getCierre(mod.id, sl.key);
    const docs = c.docs||[];
    const cnt  = docs.length;
    const st   = c.status||'pendiente';
    const tipos = ['Informe técnico','Acta firmada','Factura / Albarán','Certificado','Recibo bancario','Transferencia','Otro'];

    let docsH = '';
    if(!cnt) docsH=`<p class="empty-msg">Sin documentos aportados</p>`;
    else {
      docsH='<div class="doc-list-inline">';
      docs.forEach(d=>{
        const [ic,cl]=iconCls(d.url,d.name);
        docsH+=`<div class="di"><div class="di-top"><div class="di-ico ${cl}">${ic}</div><div class="di-info">
          <div class="di-name">${d.name||'Sin nombre'}</div>
          ${d.url?`<div class="di-url"><a href="${d.url}" target="_blank">↗ Abrir</a></div>`:''}
          ${d.tipo?`<div class="di-meta2">Tipo: ${d.tipo}</div>`:''}
          ${d.fecha?`<div class="di-meta2">Fecha: ${d.fecha}</div>`:''}

          ${d.obs?`<div class="di-meta2" style="font-style:italic">${d.obs}</div>`:''}
        </div></div>
        <div class="di-acts">
          ${d.url?`<a class="di-open" href="${d.url}" target="_blank">Abrir ↗</a>`:''}

        </div></div>`;
      });
      docsH+='</div>';
    }

    const importeField = (sl.key==='fac'||sl.key==='pago') ?
      `<div class="fr"><label>Importe</label><input type="text" id="cd_i_${mod.id}_${sl.key}" placeholder="Ej: 12.500,00 €"></div>` : '';

    h+=`<div class="cierre-card">
      <div class="cierre-card-hdr">
        <span class="icon">${sl.icon}</span>
        <h3>${sl.label}</h3>
        <span class="badge ${st}" onclick="cycleCierreStatus('${mod.id}','${sl.key}',this)">${SL[st]}</span>
      </div>
      <div class="cierre-card-body">
        <div class="cierre-meta">${sl.desc}<br><em style="color:var(--am)">Evidencia: ${sl.ev_tipo}</em>${sl.multi?'<strong style="color:var(--bl);margin-left:8px"> · Permite múltiples documentos</strong>':''}</div>
        ${docsH}
        <div class="add-doc-form"><h4>Añadir documento</h4>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="fr"><label>Nombre *</label><input type="text" id="cd_n_${mod.id}_${sl.key}" placeholder="Nombre del documento"></div>
            <div class="fr"><label>Enlace Drive / URL</label><input type="text" id="cd_u_${mod.id}_${sl.key}" placeholder="https://drive.google.com/..."></div>
            <div class="fr"><label>Tipo</label><select id="cd_t_${mod.id}_${sl.key}"><option value="">—</option>${tipos.map(t=>`<option>${t}</option>`).join('')}</select></div>
            <div class="fr"><label>Fecha</label><input type="text" id="cd_f_${mod.id}_${sl.key}" placeholder="dd/mm/aaaa"></div>
            ${importeField}
          </div>
          <div class="fr"><label>Observaciones</label><textarea id="cd_o_${mod.id}_${sl.key}" placeholder="N.º factura, referencia pago, notas..." style="min-height:36px"></textarea></div>
          <button class="add-btn" onclick="addCierreDoc('${mod.id}','${sl.key}')">+ Añadir documento</button>
        </div>
      </div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('tab-content').innerHTML = h;
}

function addCierreDoc(modId, key) {
  const name = document.getElementById(`cd_n_${modId}_${key}`).value.trim();
  if(!name){alert('El nombre es obligatorio');return;}
  const c = getCierre(modId, key);
  const impEl = document.getElementById(`cd_i_${modId}_${key}`);
  c.docs.push({
    id:Date.now()+'', name,
    url:    document.getElementById(`cd_u_${modId}_${key}`).value.trim(),
    tipo:   document.getElementById(`cd_t_${modId}_${key}`).value,
    fecha:  document.getElementById(`cd_f_${modId}_${key}`).value.trim(),
    importe:impEl ? impEl.value.trim() : '',
    obs:    document.getElementById(`cd_o_${modId}_${key}`).value.trim()
  });
  persist();
  const mod = MODULES.find(m=>m.id===modId);
  renderCierreTab(mod);
}

function delCierreDoc(modId, key, docId) {
  const c = getCierre(modId, key);
  c.docs = c.docs.filter(d=>d.id!==docId);
  persist();
  const mod = MODULES.find(m=>m.id===modId);
  renderCierreTab(mod);
}

// ── DOC ICON ─────────────────────────────────────────────────
function iconCls(url, name) {
  const u=(url||'').toLowerCase(), n=(name||'').toLowerCase();
  if(u.includes('spreadsheet')||n.endsWith('.xlsx')||n.endsWith('.csv')) return ['📊','sheet'];
  if(u.includes('document')||n.endsWith('.docx')||n.endsWith('.doc'))    return ['📄','doc'];
  if(u.includes('presentation')||n.endsWith('.pptx'))                    return ['📑','doc'];
  if(n.endsWith('.pdf')||u.includes('pdf'))                              return ['📕','pdf'];
  if(u.includes('drive.google')||u.includes('docs.google'))              return ['☁','drive'];
  if(n.match(/\.(jpg|jpeg|png|gif|webp|svg)$/))                        return ['🖼','img'];
  return ['📎','other'];
}

// ── EXPORT / IMPORT ───────────────────────────────────────────
function exportData() {
  const blob=new Blob([JSON.stringify({v:5,ts:new Date().toISOString(),state:S},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='IDCATT_v5_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function doImport(ev) {
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ try {
    const d=JSON.parse(e.target.result);
    if(d.state){S=d.state; persist(); go(CUR); alert('Importado correctamente.');}
  } catch(err){alert('Error: '+err.message);}};
  r.readAsText(f);
}
